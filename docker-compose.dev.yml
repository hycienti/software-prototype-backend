services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: pnpm dev
    ports:
      - "3333:3333"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3333
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - APP_KEY=${APP_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_DATABASE=${DB_DATABASE:-haven}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-dev}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-dev}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-dev}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID:-dev}
      - APPLE_KEY_ID=${APPLE_KEY_ID:-dev}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY:-dev}
      # File watching inside Docker on macOS is flaky without polling
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=500
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
