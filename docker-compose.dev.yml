services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: pnpm dev
    ports:
      - '3333:3333'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/build
      - /app/.adonisjs
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3333
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - APP_URL=${APP_URL:-http://localhost:3333}
      - APP_KEY=${APP_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_DATABASE=${DB_DATABASE:-haven}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-dev}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-dev}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-dev}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID:-dev}
      - APPLE_KEY_ID=${APPLE_KEY_ID:-dev}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY:-dev}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-dummy}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-dummy}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-21m00Tcm4TlvDq8ikWAM}
      - ELEVENLABS_MODEL_ID=${ELEVENLABS_MODEL_ID:-eleven_turbo_v2_5}
      - ELEVENLABS_STT_MODEL_ID=${ELEVENLABS_STT_MODEL_ID:-scribe_v1}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-noreply@haven.app}
      - RESEND_FROM_NAME=${RESEND_FROM_NAME:-Haven}
      - PUSHER_APP_ID=${PUSHER_APP_ID}
      - PUSHER_KEY=${PUSHER_KEY}
      - PUSHER_SECRET=${PUSHER_SECRET}
      - PUSHER_CLUSTER=${PUSHER_CLUSTER}
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - WATCHPACK_POLLING=true
      - ADONIS_RESYNC_INTERVAL=2000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    stdin_open: true
    tty: true

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_DATABASE:-haven}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_DATABASE:-haven}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
