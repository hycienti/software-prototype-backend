services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: pnpm dev
    ports:
      - '3333:3333'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/build
      - /app/.adonisjs
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3333
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - APP_URL=${APP_URL:-http://localhost:3333}
      - APP_KEY=${APP_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_DATABASE=${DB_DATABASE:-haven}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-dev}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-dev}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-dev}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID:-dev}
      - APPLE_KEY_ID=${APPLE_KEY_ID:-dev}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY:-dev}
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - WATCHPACK_POLLING=true
      - NODE_OPTIONS=--watch
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    stdin_open: true
    tty: true

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_DATABASE:-haven}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_DATABASE:-haven}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
