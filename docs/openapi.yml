openapi: 3.0.3
info:
  title: Havens Backend API
  version: 1.0.0
  description: |
    OpenAPI (Swagger) specification for Havens Backend.

    Google Auth uses OAuth 2.0 web flow: redirect to `/api/v1/auth/google`, authenticate, then callback returns token.
servers:
  - url: http://localhost:3333
    description: Local development

tags:
  - name: Auth
    description: Authentication and session endpoints
  - name: Therapist Auth
    description: Therapist Authentication and onboarding endpoints
  - name: Conversations
    description: Chat and conversation management
  - name: Realtime
    description: Real-time event broadcasting via Pusher

paths:
  /api/v1/conversations:
    post:
      tags: [Conversations]
      summary: Send a message
      description: |
        Send a text message and get AI response.
        Supports real-time streaming via Pusher.

        **Real-time Streaming:**
        If `stream: true` is provided, the server will broadcast the AI response in chunks via Pusher.

        **Pusher Details:**
        - **Channel:** `conversation-{conversationId}`
        - **Events:**
          - `stream:start`: `{ messageId: number }`
          - `stream:chunk`: `{ content: string }`
          - `stream:complete`: `{ messageId: number, conversationId: number }`
          - `stream:error`: `{ message: string }`
      operationId: conversationsSendMessage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: 'How are you feeling today?'
                conversationId:
                  type: integer
                  example: 1
                mode:
                  type: string
                  enum: [text, voice]
                  default: text
                stream:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Message sent and AI response generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    $ref: '#/components/schemas/Conversation'
                  message:
                    $ref: '#/components/schemas/Message'
                  response:
                    $ref: '#/components/schemas/Message'
                  sentiment:
                    type: object
                    properties:
                      sentiment:
                        type: string
                      crisisIndicators:
                        type: array
                        items:
                          type: string
                      confidence:
                        type: number
        '401':
          description: Unauthorized
        '422':
          description: Validation error

  /api/v1/auth/send-otp:
    post:
      tags: [Auth]
      summary: Send OTP to email
      description: Sends a 6-digit OTP code to the provided email address.
      operationId: authSendOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
            examples:
              default:
                value:
                  email: user@example.com
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: OTP sent successfully
                  expiresIn:
                    type: integer
                    example: 600
              examples:
                default:
                  value:
                    message: OTP sent successfully
                    expiresIn: 600
        '422':
          description: Validation error
        '429':
          description: Too many requests (rate limiting)

  /api/v1/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify OTP code
      description: Verifies the OTP code and returns user info or indicates if signup is needed.
      operationId: authVerifyOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                code:
                  type: string
                  example: '123456'
            examples:
              default:
                value:
                  email: user@example.com
                  code: '123456'
      responses:
        '200':
          description: OTP verified or signup required
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/UserPublic'
                      token:
                        $ref: '#/components/schemas/Token'
                      requiresSignup:
                        type: boolean
                        example: false
                  - type: object
                    properties:
                      requiresSignup:
                        type: boolean
                        example: true
                      email:
                        type: string
                        example: user@example.com
                      message:
                        type: string
                        example: Please complete your signup by providing your full name
              examples:
                success:
                  summary: Login successful
                  value:
                    user:
                      id: 1
                      email: user@example.com
                      fullName: Ada Lovelace
                      avatarUrl: https://cdn.haven.app/avatar.png
                      emailVerified: true
                    token:
                      type: bearer
                      value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      expiresAt: '2026-01-23T12:00:00.000Z'
                    requiresSignup: false
                signupRequired:
                  summary: Signup required
                  value:
                    requiresSignup: true
                    email: user@example.com
                    message: Please complete your signup by providing your full name
        '400':
          description: Invalid or expired OTP
        '422':
          description: Validation error

  /api/v1/auth/complete-signup:
    post:
      tags: [Auth]
      summary: Complete signup with fullname
      description: Completes the signup process for new users by saving their fullname.
      operationId: authCompleteSignup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, fullName]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                fullName:
                  type: string
                  example: John Doe
            examples:
              default:
                value:
                  email: user@example.com
                  fullName: John Doe
      responses:
        '200':
          description: Signup completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserPublic'
                  token:
                    $ref: '#/components/schemas/Token'
              examples:
                default:
                  value:
                    user:
                      id: 1
                      email: user@example.com
                      fullName: John Doe
                      avatarUrl: null
                      emailVerified: true
                    token:
                      type: bearer
                      value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      expiresAt: '2026-01-23T12:00:00.000Z'
        '400':
          description: User already exists or OTP not verified
        '422':
          description: Validation error
  /api/v1/auth/google:
    get:
      tags: [Auth]
      summary: Redirect to Google OAuth
      description: |
        Initiates Google OAuth 2.0 flow by redirecting to Google's consent screen.

        After user authenticates, Google redirects to `/api/v1/auth/google/callback` which returns the bearer token.
      operationId: authGoogleRedirect
      responses:
        '302':
          description: Redirects to Google OAuth consent page
          headers:
            Location:
              description: Google OAuth authorization URL
              schema:
                type: string

  /api/v1/auth/google/callback:
    get:
      tags: [Auth]
      summary: Google OAuth callback
      description: |
        Handles the callback from Google OAuth after user authentication.

        This endpoint is called by Google after user grants permissions.
        Returns user information and bearer token.
      operationId: authGoogleCallback
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                default:
                  value:
                    user:
                      id: 1
                      email: user@example.com
                      fullName: Ada Lovelace
                      avatarUrl: https://cdn.haven.app/avatar.png
                      emailVerified: true
                    token:
                      type: bearer
                      value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      expiresAt: '2026-01-23T12:00:00.000Z'
        '400':
          description: OAuth error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  value:
                    message: OAuth error
        '401':
          description: Access denied or invalid OAuth state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  value:
                    message: Access denied

  /api/v1/auth/apple:
    post:
      tags: [Auth]
      summary: Sign in with Apple
      description: |
        Exchanges an Apple `idToken` for an API bearer token.

        The server fetches Apple's signing keys, verifies the JWT signature,
        and checks the `aud` matches the configured `APPLE_CLIENT_ID`.
      operationId: authApple
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppleAuthRequest'
            examples:
              default:
                value:
                  idToken: 'eyJraWQiOiIxQTJCNEMzRCIsImFsZyI6IlJTMjU2In0...'
                  fullName: 'Ada Lovelace'
                  authorizationCode: 'c9b2a0c2c9d14f7a9c...'
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request or token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/v1/user/me:
    get:
      tags: [Auth]
      summary: Get current user
      operationId: authMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
              examples:
                default:
                  value:
                    user:
                      id: 1
                      email: user@example.com
                      fullName: Ada Lovelace
                      avatarUrl: https://cdn.haven.app/avatar.png
                      emailVerified: true
                      lastLoginAt: '2026-01-23T11:00:00.000Z'
                      createdAt: '2026-01-01T10:00:00.000Z'
        '401':
          description: Missing/invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  value:
                    message: Unauthorized

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh bearer token
      description: |
        Rotates the current bearer token.

        This endpoint requires a valid bearer token; it deletes the current token and
        issues a new one.
      operationId: authRefresh
      security:
        - bearerAuth: []
      responses:
        '200':
          description: New bearer token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
              examples:
                default:
                  value:
                    token:
                      type: bearer
                      value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      expiresAt: '2026-01-23T12:00:00.000Z'
        '401':
          description: Missing/invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  value:
                    message: Unauthorized

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: |
        Deletes the current bearer token.
      operationId: authLogout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
              examples:
                default:
                  value:
                    message: Logged out successfully
        '401':
          description: Missing/invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  value:
                    message: Unauthorized

  /api/v1/therapist/auth/send-otp:
    post:
      tags: [Therapist Auth]
      summary: Send OTP to therapist email
      description: Sends a 6-digit OTP code to the provided therapist email address.
      operationId: therapistAuthSendOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: therapist@example.com
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: OTP sent successfully
                  expiresIn:
                    type: integer
                    example: 600

  /api/v1/therapist/auth/verify-otp:
    post:
      tags: [Therapist Auth]
      summary: Verify therapist OTP code
      description: Verifies the OTP code and returns therapist info or indicates if onboarding is needed.
      operationId: therapistAuthVerifyOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                  format: email
                  example: therapist@example.com
                code:
                  type: string
                  example: '123456'
      responses:
        '200':
          description: OTP verified or onboarding required
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      therapist:
                        $ref: '#/components/schemas/TherapistPublic'
                      token:
                        $ref: '#/components/schemas/Token'
                      requiresOnboarding:
                        type: boolean
                        example: false
                  - type: object
                    properties:
                      requiresOnboarding:
                        type: boolean
                        example: true
                      email:
                        type: string
                        example: therapist@example.com
                      message:
                        type: string
                        example: Please complete your onboarding by providing your professional details
        '400':
          description: Invalid or expired OTP

  /api/v1/therapist/auth/specialties:
    get:
      tags: [Therapist Auth]
      summary: List all available specialties
      description: Returns a list of all professional specialties available for therapists.
      operationId: therapistAuthSpecialties
      responses:
        '200':
          description: A list of specialties
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: [Anxiety, Depression, CBT]

  /api/v1/therapist/auth/onboard:
    post:
      tags: [Therapist Auth]
      summary: Complete therapist onboarding
      description: Completes the onboarding process for new therapists by saving their professional details.
      operationId: therapistAuthOnboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TherapistOnboardRequest'
      responses:
        '200':
          description: Onboarding completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  therapist:
                    $ref: '#/components/schemas/TherapistPublic'
                  token:
                    $ref: '#/components/schemas/Token'
        '400':
          description: Therapist already exists or OTP not verified

  /api/v1/therapist/auth/me:
    get:
      tags: [Therapist Auth]
      summary: Get current therapist profile
      operationId: therapistAuthMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current therapist
          content:
            application/json:
              schema:
                type: object
                properties:
                  therapist:
                    $ref: '#/components/schemas/TherapistMe'
        '401':
          description: Missing/invalid bearer token

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        API token returned by the auth endpoints.

        Send as: `Authorization: Bearer <token>`

  schemas:
    Conversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
          nullable: true
        mode:
          type: string
          enum: [text, voice]
        createdAt:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        id:
          type: integer
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        metadata:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time

    AppleAuthRequest:
      type: object
      additionalProperties: false
      required: [idToken]
      properties:
        idToken:
          type: string
          description: Apple ID token (JWT)
          example: 'eyJraWQiOiIxQTJCNEMzRCIsImFsZyI6IlJTMjU2In0...'
        fullName:
          type: string
          nullable: true
          example: 'Ada Lovelace'
        authorizationCode:
          type: string
          nullable: true
          description: Presently unused by the API, accepted for future Apple flows
          example: 'c9b2a0c2c9d14f7a9c...'

    UserPublic:
      type: object
      additionalProperties: false
      required: [id, email, fullName, avatarUrl, emailVerified]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        fullName:
          type: string
          nullable: true
          example: Ada Lovelace
        avatarUrl:
          type: string
          nullable: true
          example: https://cdn.haven.app/avatar.png
        emailVerified:
          type: boolean
          example: true

    UserMe:
      allOf:
        - $ref: '#/components/schemas/UserPublic'
        - type: object
          additionalProperties: false
          required: [lastLoginAt, createdAt]
          properties:
            lastLoginAt:
              type: string
              format: date-time
              nullable: true
            createdAt:
              type: string
              format: date-time

    TherapistPublic:
      type: object
      additionalProperties: false
      required: [id, email, fullName, professionalTitle, emailVerified]
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: therapist@example.com
        fullName:
          type: string
          example: Dr. Sarah Mitchell
        professionalTitle:
          type: string
          example: Psychologist, LCSW
        specialties:
          type: array
          items:
            type: string
          example: [Anxiety, Depression]
        emailVerified:
          type: boolean
          example: true

    TherapistMe:
      allOf:
        - $ref: '#/components/schemas/TherapistPublic'
        - type: object
          properties:
            licenseUrl:
              type: string
              format: uri
              nullable: true
            identityUrl:
              type: string
              format: uri
              nullable: true
            lastLoginAt:
              type: string
              format: date-time
              nullable: true
            createdAt:
              type: string
              format: date-time

    TherapistOnboardRequest:
      type: object
      required: [email, fullName, professionalTitle, specialties]
      properties:
        email:
          type: string
          format: email
          example: therapist@example.com
        fullName:
          type: string
          example: Dr. Sarah Mitchell
        professionalTitle:
          type: string
          example: Psychologist, LCSW
        licenseUrl:
          type: string
          format: uri
          example: https://example.com/license.pdf
        identityUrl:
          type: string
          format: uri
          example: https://example.com/id.pdf
        specialties:
          type: array
          items:
            type: string
          example: [Anxiety, Depression]

    Token:
      type: object
      additionalProperties: false
      required: [type, value, expiresAt]
      properties:
        type:
          type: string
          enum: [bearer]
          example: bearer
        value:
          type: string
          description: Token string to use in the Authorization header
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        expiresAt:
          type: string
          format: date-time
          nullable: true
          example: 2026-01-23T12:00:00.000Z

    AuthResponse:
      type: object
      additionalProperties: false
      required: [user, token]
      properties:
        user:
          $ref: '#/components/schemas/UserPublic'
        token:
          $ref: '#/components/schemas/Token'
      example:
        user:
          id: 1
          email: user@example.com
          fullName: Ada Lovelace
          avatarUrl: https://cdn.haven.app/avatar.png
          emailVerified: true
        token:
          type: bearer
          value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
          expiresAt: 2026-01-23T12:00:00.000Z

    MeResponse:
      type: object
      additionalProperties: false
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/UserMe'
      example:
        user:
          id: 1
          email: user@example.com
          fullName: Ada Lovelace
          avatarUrl: https://cdn.haven.app/avatar.png
          emailVerified: true
          lastLoginAt: 2026-01-23T11:00:00.000Z
          createdAt: 2026-01-01T10:00:00.000Z

    RefreshResponse:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          $ref: '#/components/schemas/Token'
      example:
        token:
          type: bearer
          value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
          expiresAt: 2026-01-23T12:00:00.000Z

    LogoutResponse:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        message:
          type: string
          example: Logged out successfully
      example:
        message: Logged out successfully

    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        message:
          type: string
          example: Unauthorized
      example:
        message: Unauthorized

    ValidationErrorResponse:
      type: object
      additionalProperties: true
      description: VineJS/Adonis validation error payload (shape may vary by configuration).
      properties:
        errors:
          type: array
          items:
            type: object
            additionalProperties: true
      example:
        errors:
          - field: email
            message: Email is required
          - field: password
            message: Password must be at least 8 characters
