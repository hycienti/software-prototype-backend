openapi: 3.0.3
info:
  title: Havens Backend API
  version: 1.0.0
  description: |
    OpenAPI (Swagger) specification for Havens Backend.

    Auth is handled via OAuth identity tokens (Google/Apple) exchanged for an API bearer token.
servers:
  - url: http://localhost:3333
    description: Local development

tags:
  - name: Auth
    description: Authentication and session endpoints

paths:
  /api/v1/auth/google:
    post:
      tags: [Auth]
      summary: Sign in with Google
      description: |
        Exchanges a Google `idToken` for an API bearer token.

        The server validates the token via Google's tokeninfo endpoint and checks the `aud`
        matches the configured `GOOGLE_CLIENT_ID`.
      operationId: authGoogle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleAuthRequest'
            examples:
              default:
                value:
                  idToken: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..."
                  fullName: "Obiabo"
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request or token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/v1/auth/apple:
    post:
      tags: [Auth]
      summary: Sign in with Apple
      description: |
        Exchanges an Apple `idToken` for an API bearer token.

        The server fetches Apple's signing keys, verifies the JWT signature,
        and checks the `aud` matches the configured `APPLE_CLIENT_ID`.
      operationId: authApple
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppleAuthRequest'
            examples:
              default:
                value:
                  idToken: "eyJraWQiOiIxQTJCNEMzRCIsImFsZyI6IlJTMjU2In0..."
                  fullName: "Ada Lovelace"
                  authorizationCode: "c9b2a0c2c9d14f7a9c..."
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request or token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/v1/user/me:
    get:
      tags: [Auth]
      summary: Get current user
      operationId: authMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Missing/invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh bearer token
      description: |
        Rotates the current bearer token.

        This endpoint requires a valid bearer token; it deletes the current token and
        issues a new one.
      operationId: authRefresh
      security:
        - bearerAuth: []
      responses:
        '200':
          description: New bearer token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Missing/invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: |
        Deletes the current bearer token.
      operationId: authLogout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          description: Missing/invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        API token returned by the auth endpoints.

        Send as: `Authorization: Bearer <token>`

  schemas:
    GoogleAuthRequest:
      type: object
      additionalProperties: false
      required: [idToken]
      properties:
        idToken:
          type: string
          description: Google ID token (JWT)
        fullName:
          type: string
          nullable: true
          description: Optional display name to persist when the provider does not supply it

    AppleAuthRequest:
      type: object
      additionalProperties: false
      required: [idToken]
      properties:
        idToken:
          type: string
          description: Apple ID token (JWT)
        fullName:
          type: string
          nullable: true
        authorizationCode:
          type: string
          nullable: true
          description: Presently unused by the API, accepted for future Apple flows

    UserPublic:
      type: object
      additionalProperties: false
      required: [id, email, fullName, avatarUrl, emailVerified]
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        fullName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        emailVerified:
          type: boolean

    UserMe:
      allOf:
        - $ref: '#/components/schemas/UserPublic'
        - type: object
          additionalProperties: false
          required: [lastLoginAt, createdAt]
          properties:
            lastLoginAt:
              type: string
              format: date-time
              nullable: true
            createdAt:
              type: string
              format: date-time

    Token:
      type: object
      additionalProperties: false
      required: [type, value, expiresAt]
      properties:
        type:
          type: string
          enum: [bearer]
        value:
          type: string
          description: Token string to use in the Authorization header
        expiresAt:
          type: string
          format: date-time
          nullable: true

    AuthResponse:
      type: object
      additionalProperties: false
      required: [user, token]
      properties:
        user:
          $ref: '#/components/schemas/UserPublic'
        token:
          $ref: '#/components/schemas/Token'

    MeResponse:
      type: object
      additionalProperties: false
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/UserMe'

    RefreshResponse:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          $ref: '#/components/schemas/Token'

    LogoutResponse:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        message:
          type: string
          example: Logged out successfully

    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        message:
          type: string
          example: Unauthorized

    ValidationErrorResponse:
      type: object
      additionalProperties: true
      description: VineJS/Adonis validation error payload (shape may vary by configuration).
      properties:
        errors:
          type: array
          items:
            type: object
            additionalProperties: true
